<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to March 20, 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #3b2f2f;
            --text-color: #f2ece4;
            --accent-color: #8f9f79;
            --card-bg: rgba(143, 159, 121, 0.16);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(143, 159, 121, 0.22) 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(111, 78, 55, 0.25) 0%, transparent 45%);
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.2rem;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .countdown {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-segment {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 1rem;
            min-width: 120px;
            border: 1px solid rgba(242, 236, 228, 0.2);
            box-shadow: 0 10px 25px -5px rgba(27, 20, 17, 0.35);
        }

        .number {
            display: block;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent-color);
            line-height: 1;
        }

        .label {
            display: block;
            margin-top: 0.5rem;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1rem;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .countdown {
                gap: 1rem;
            }

            .time-segment {
                padding: 1.5rem;
                min-width: 80px;
            }

            .number {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>COUNTDOWN TO MARCH 20, 2026</h1>
        <div class="countdown">
            <div class="time-segment">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-segment">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-segment">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="time-segment">
                <span class="number" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date('March 20, 2026 18:30:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');

            if (distance < 0) {
                clearInterval(interval);
                document.querySelector('.container').innerHTML = '<h1>THE TIME HAS ARRIVED</h1>';
            }
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>

</html>
